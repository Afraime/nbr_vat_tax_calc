<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional VAT & Tax Calculator - Pixmelab</title>
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #4b86f0; /* Color inspired by the logo's liquid */
            --success: #2ec4b6;
            --bg: #f8f9fa;
            --card: #ffffff;
            --text: #2b2d42;
            --link: #0077b6; /* Distinct color for links */
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #e0eafc 0%, #cfdef3 100%);
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; margin: 0; color: var(--text);
            padding: 20px;
        }

        .main-container {
            display: flex; flex-direction: column; align-items: center; gap: 30px;
        }

        .logo-section { text-align: center; }
        .logo-image { 
            max-width: 150px; 
            height: auto; 
            display: block; 
            margin: 0 auto; 
            /* If the logo background isn't transparent, a mask might be needed. 
               Alternatively, the body background can be set to the logo's light gray. */
            background: #f4f4f4; /* Match logo background to avoid a box effect */
            padding: 20px; border-radius: 15px; 
        }

        .container { 
            background: var(--card); padding: 2.5rem; border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 450px; 
        }

        h2 { text-align: center; margin-bottom: 1.5rem; font-weight: 700; color: var(--primary); }

        .mode-selector {
            display: flex; background: #eee; border-radius: 10px; padding: 5px; margin-bottom: 20px;
        }

        .mode-btn {
            flex: 1; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
            background: transparent; transition: 0.3s; font-weight: 600;
        }

        .mode-btn.active { background: var(--primary); color: white; }

        .input-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; font-size: 0.85rem; font-weight: 600; color: #666; }
        
        input { 
            width: 100%; padding: 12px; border: 2px solid #edf2f4; border-radius: 10px; 
            box-sizing: border-box; font-size: 1rem; transition: 0.3s;
        }

        input:focus { border-color: var(--primary); outline: none; background: #fdfdfd; }

        .results-panel { 
            margin-top: 25px; padding: 20px; background: #f8f9ff; 
            border-radius: 15px; border: 1px solid #e0e7ff;
        }

        .res-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 1rem; }
        .res-row.grand-total { 
            margin-top: 15px; padding-top: 15px; border-top: 2px dashed #d1d9e6;
            font-weight: 700; font-size: 1.2rem; color: var(--primary);
        }

        .copy-btn {
            width: 100%; margin-top: 15px; padding: 10px; background: #8d99ae;
            color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 0.9rem;
        }
        .copy-btn:hover { background: #2b2d42; }

        .developer-badge {
            margin-top: 20px; text-align: center; font-size: 0.8rem; color: #777;
        }
        .developer-badge a {
            color: var(--link); text-decoration: none; font-weight: bold;
        }
        .developer-badge a:hover { text-decoration: underline; }

    </style>
</head>
<body>

<div class="main-container">

    <div class="logo-section">
        <img src="logo.png" alt="Pixmelab Logo" class="logo-image" onerror="this.style.display='none'; document.getElementById('logoFallback').style.display='block';">
        <!-- Text fallback if logo image isn't available in the folder -->
        <h1 id="logoFallback" style="display:none; font-family: sans-serif; font-weight:900; margin:0; padding-bottom:10px;">PIXMELAB</h1>
    </div>

    <div class="container">
        <h2>TaxFlow <span style="font-weight: 300;">Pro</span></h2>
        
        <div class="mode-selector">
            <button id="btnInc" class="mode-btn active" onclick="setMode('inc')">Inclusive</button>
            <button id="btnExc" class="mode-btn" onclick="setMode('exc')">Exclusive</button>
        </div>

        <div class="input-group">
            <label id="priceLabel">Grand Total (GT)</label>
            <input type="number" id="price" placeholder="0.00" oninput="calculate()">
        </div>

        <div style="display: flex; gap: 15px;">
            <div class="input-group" style="flex: 1;">
                <label>Tax %</label>
                <input type="number" id="taxPer" value="5" oninput="calculate()">
            </div>
            <div class="input-group" style="flex: 1;">
                <label>VAT %</label>
                <input type="number" id="vatPer" value="10" oninput="calculate()">
            </div>
        </div>

        <div class="results-panel">
            <div class="res-row">
                <span>Base Sub-Total:</span>
                <span id="resSub">0.00</span>
            </div>
            <div class="res-row">
                <span>VAT Amount:</span>
                <span id="resVat">0.00</span>
            </div>
            <div class="res-row">
                <span>Tax Amount:</span>
                <span id="resTax">0.00</span>
            </div>
            <div class="res-row grand-total">
                <span id="totalLabel">Final Sub-Total:</span>
                <span id="resTotal">0.00</span>
            </div>
        </div>

        <button class="copy-btn" onclick="copyResults()">Copy Results</button>

        <div class="developer-badge">
            Created by <a href="https://afraime.github.io/portfolio/" target="_blank">Afraime Sayed</a>
        </div>
    </div>

</div>

<script>
    let currentMode = 'inc';

    function setMode(mode) {
        currentMode = mode;
        document.getElementById('btnInc').classList.toggle('active', mode === 'inc');
        document.getElementById('btnExc').classList.toggle('active', mode === 'exc');
        
        document.getElementById('priceLabel').innerText = mode === 'inc' ? 'Grand Total (GT)' : 'Sub-Total (ST)';
        document.getElementById('totalLabel').innerText = mode === 'inc' ? 'Clean Sub-Total:' : 'Grand Total:';
        
        calculate();
    }

    function calculate() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const t_per = parseFloat(document.getElementById('taxPer').value) || 0;
        const v_per = parseFloat(document.getElementById('vatPer').value) || 0;
        
        let vat, tax, subTotal, grandTotal;

        if (currentMode === 'inc') {
            // Formula: VAT = GT - (GT / ((100 + percentage) / 100))
            vat = price - (price / ((100 + v_per) / 100));
            // Formula: Tax = (GT - VAT) * percentage%
            tax = (price - vat) * (t_per / 100);
            subTotal = price - vat - tax;
            
            updateUI(subTotal, vat, tax, subTotal);
        } else {
            // Formula: tax = (ST / ((100 - percentage) / 100) * percentage%)
            tax = (price / ((100 - t_per) / 100)) * (t_per / 100);
            // Formula: vat = (ST + tax) * percentage%
            vat = (price + tax) * (v_per / 100);
            grandTotal = price + tax + vat;
            
            updateUI(price, vat, tax, grandTotal);
        }
    }

    function updateUI(sub, v, t, total) {
        document.getElementById('resSub').innerText = sub.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resVat').innerText = v.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resTax').innerText = t.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        document.getElementById('resTotal').innerText = total.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    }

    function copyResults() {
        const text = `Results:\nVAT: ${document.getElementById('resVat').innerText}\nTax: ${document.getElementById('resTax').innerText}\nTotal: ${document.getElementById('resTotal').innerText}`;
        navigator.clipboard.writeText(text);
        alert("Results copied to clipboard!");
    }
</script>

</body>
</html>
